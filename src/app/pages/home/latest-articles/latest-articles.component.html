<div class="chess-card latest-articles-widget" *ngIf="!isLoading && latestBlogs.length > 0">
  <h3 class="h5 border-bottom border-dark pb-2 mb-3">Recent Activity</h3>
  
  <div class="articles-list">
    <div class="article-item mb-3 pb-3 border-bottom border-dark-subtle" *ngFor="let blog of latestBlogs.slice(0, 3)">
      <div class="d-flex align-items-center">
        <img [src]="imageBaseUrl + blog.image" 
             class="article-thumb rounded me-3" 
             alt="{{blog.titleBlog}}"
             onerror="this.src='assets/ai-sample.webp'">
        <div class="article-info">
          <h4 class="h6 mb-1 text-truncate" style="max-width: 150px;">{{ blog.titleBlog }}</h4>
          <a [routerLink]="['/blog-single', blog.id]" class="btn btn-link p-0 text-green smallest text-decoration-none">Read Game Log</a>
        </div>
      </div>
    </div>
  </div>
  
  <a routerLink="/blogs" class="btn btn-dark btn-sm w-100">View News Feed</a>
</div>
