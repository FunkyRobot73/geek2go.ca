<div class="dashboard-page animate__animated animate__fadeIn">
  
  <header class="section-header mb-4 d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h2">The Nerd Feed</h1>
      <p class="text-muted smallest">Code, Comics, and Everything In-Between</p>
    </div>
    
    <!-- Filter Dropdown -->
    <div class="dropdown">
      <button class="btn btn-dark btn-sm dropdown-toggle border border-dark" type="button" data-bs-toggle="dropdown">
        Category: {{ selectedCategory || 'All' }}
      </button>
      <ul class="dropdown-menu dropdown-menu-dark bg-chess-panel border-dark">
        <li *ngFor="let cat of categories">
          <a class="dropdown-item smallest" (click)="filterByCategory(cat)">{{ cat }}</a>
        </li>
      </ul>
    </div>
  </header>

  <div class="row">
    <div class="col-lg-12">
      <!-- Article Feed Container -->
      <div class="article-feed">
        <div *ngFor="let blog of filteredBlogs" class="chess-card hoverable mb-3 article-feed-item">
          <div class="row align-items-center g-3">
            <!-- Thumbnail -->
            <div class="col-md-3">
              <div class="article-thumb-wrapper">
                <img [src]="'https://back.funkyrobot.ca/public/' + blog.image" 
                     alt="{{blog.titleBlog}}"
                     class="img-fluid rounded"
                     onerror="this.src='assets/ai-sample.jpg'"/>
              </div>
            </div>
            
            <!-- Content -->
            <div class="col-md-9">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <span class="badge rounded-pill bg-dark border border-dark text-green smallest">{{ blog.catBlog }}</span>
                <span class="smallest text-muted">Posted recently</span>
              </div>
              
              <h3 class="h5 mb-2">{{ blog.titleBlog }}</h3>
              
              <p class="smallest text-muted mb-3 line-clamp-2" 
                 [innerHTML]="(blog.bodyBlog | slice:0:180) + '...'"></p>
              
              <a [href]="'/blog-single/' + blog.idBlog" class="btn btn-link p-0 text-green smallest text-decoration-none fw-bold">
                Read Full Story <i class="fa-solid fa-arrow-right list-icon"></i>
              </a>
            </div>
          </div>
        </div>

        <!-- Empty State -->
        <div *ngIf="filteredBlogs.length === 0" class="chess-card text-center py-5">
          <i class="fa-solid fa-folder-open h1 text-muted mb-3 d-block"></i>
          <p class="text-muted">No logs found in this category.</p>
          <button class="btn btn-dark btn-sm" (click)="filterByCategory('All')">Clear Filters</button>
        </div>
      </div>
    </div>
  </div>

</div>
